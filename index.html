<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haker Pro | 180+ Systems</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0f0a;
            font-family: 'Courier New', monospace;
            color: #8bc34a;
            min-height: 100vh;
        }
        /* АВТОРИЗАЦИЯ */
        #authOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #020602; z-index:99999;
            display: flex; align-items:center; justify-content:center;
        }
        .auth-box {
            background: #0a100a;
            border: 2px solid #3a5a2a;
            border-radius: 16px;
            padding: 30px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 50px rgba(50,120,50,0.5);
        }
        .auth-box h2 {
            color: #b0ff80;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        .auth-box input {
            width: 100%;
            background: #030803;
            border: 1px solid #4a7a2a;
            color: #8bc34a;
            padding: 10px;
            margin: 8px 0;
            font-family: monospace;
            border-radius: 8px;
            outline: none;
            font-size: 0.8rem;
        }
        .auth-box button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            font-size: 0.8rem;
            background: #0a1808;
            border: 2px solid #4a8a2a;
            color: #8bc34a;
            border-radius: 30px;
            cursor: pointer;
            font-family: monospace;
        }
        .auth-box button:hover {
            background: #2a5a1a;
            color: #e0ffb0;
        }
        .auth-error {
            color: #ff6644;
            font-size: 0.7rem;
            margin-top: 10px;
            min-height: 20px;
        }
        .auth-success {
            color: #88ff88;
            font-size: 0.7rem;
            margin-top: 10px;
        }
        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        #mainUI {
            display: none;
            padding: 12px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(6,14,4,0.96);
            border: 1px solid #5a8a3a;
            border-radius: 24px;
            padding: 14px 18px 22px;
        }
        .glitch {
            font-size: 1.3rem;
            border-left: 4px solid #6a9a3a;
            padding-left: 14px;
            margin-bottom: 14px;
            color: #c0ff80;
        }
        .stats-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            background: #030803;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            justify-content: space-between;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-bottom: 16px;
            border-bottom: 1px solid #3a5a2a;
            overflow-x: auto;
            max-height: 140px;
            overflow-y: auto;
        }
        .tab-btn {
            background: #0a1808;
            border: 1px solid #4a7a2a;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            color: #8bc34a;
            font-size: 0.58rem;
            white-space: nowrap;
            margin: 1px;
        }
        .tab-btn.active {
            background: #2a5a1a;
            color: #e0ffb0;
            border-color: #6a9a3a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .card {
            background: rgba(4,10,2,0.95);
            border: 1px solid #3a6a2a;
            border-radius: 14px;
            padding: 10px;
        }
        .card h3 {
            font-size: 0.75rem;
            margin-bottom: 6px;
            border-bottom: 1px solid #3a6a2a;
            padding-bottom: 3px;
            color: #c0ff80;
        }
        button {
            background: #0a1808;
            border: 1px solid #4a8a2a;
            color: #8bc34a;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 4px;
            width: 100%;
            font-size: 0.55rem;
            font-family: monospace;
        }
        button:hover {
            background: #2a5a1a;
            color: #e0ffb0;
        }
        input {
            width: 100%;
            background: #030803;
            border: 1px solid #3a6a2a;
            color: #8bc34a;
            padding: 4px;
            border-radius: 8px;
            margin: 3px 0;
            font-size: 0.55rem;
            font-family: monospace;
            outline: none;
        }
        .cmd-area {
            background: #060c04;
            border: 1px solid #3a6a2a;
            border-radius: 14px;
            padding: 6px;
            margin-top: 12px;
        }
        .cmd-output {
            background: #030803;
            padding: 6px;
            font-size: 0.55rem;
            border-radius: 10px;
            max-height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }
        .cmd-input-line {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        #cmdInput {
            flex: 1;
            background: #030803;
            border: 1px solid #3a6a2a;
            color: #9fdf6f;
            padding: 4px 8px;
            border-radius: 20px;
            outline: none;
            font-size: 0.55rem;
            font-family: 'Courier New', monospace;
        }
        .helper-commands {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 4px;
        }
        .cmd-btn {
            width: auto;
            padding: 2px 5px;
            font-size: 0.45rem;
        }
        .k-card {
            border: 1px solid #b8860b;
            background: #0a0a02;
            color: #ffd700;
            border-radius: 12px;
            padding: 10px;
        }
        .k-card h3 {
            color: #ffcc00;
            border-bottom: 1px solid #b8860b;
        }
        .k-btn {
            background: #332200;
            border: 1px solid #b8860b;
            color: #ffd700;
            margin: 3px 0;
        }
        .k-btn:hover {
            background: #5a4500;
        }
    </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="authOverlay">
    <div class="auth-box">
        <h2>🔐 SYSADMIN AUTH</h2>
        <input type="text" id="authUser" placeholder="Логин" autocomplete="off">
        <input type="password" id="authPass" placeholder="Пароль" autocomplete="off">
        <button id="authLoginBtn" onclick="doLogin()">▶ ВХОД В СИСТЕМУ</button>
        <div class="auth-error" id="authError"></div>
    </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div id="mainUI">
    <div class="container">
        <div class="glitch">🛠️ HAKER ULTIMATE | 180+ SYSTEMS | SYSADMIN: <span id="authUserShow">—</span> 🛠️</div>

        <div class="stats-bar">
            <span>🟢 VR: 29 моделей</span>
            <span>📱 РЕЖИМ: USB</span>
            <span>🔌 USB: ❌</span>
            <span>🎮 ГЕЙМПАДЫ: 0</span>
            <span>⚡ СИСТЕМ: 180+</span>
        </div>

        <div class="tabs" id="tabsContainer"></div>
        <div id="allTabContents"></div>

        <div class="cmd-area">
            <div class="cmd-output" id="cmdOutput">> ✅ СИСТЕМА ГОТОВА. Введите help для списка команд.</div>
            <div class="cmd-input-line">
                <span style="color:#8bc34a; font-size:0.6rem;">$&gt;</span>
                <input type="text" id="cmdInput" placeholder="Введите команду..." onkeypress="if(event.key==='Enter')executeCmd()">
                <button onclick="executeCmd()" style="width:auto;">▶ ВЫПОЛНИТЬ</button>
            </div>
            <div class="helper-commands">
                <button class="cmd-btn" onclick="processCommand('help')">help</button>
                <button class="cmd-btn" onclick="processCommand('clear')">clear</button>
                <button class="cmd-btn" onclick="processCommand('matrix')">matrix</button>
                <button class="cmd-btn" onclick="processCommand('portscan')">portscan</button>
                <button class="cmd-btn" onclick="processCommand('bruteforce')">bruteforce</button>
            </div>
        </div>
    </div>
</div>

<script>
// ========== АВТОРИЗАЦИЯ ==========
const VALID_USER = "admin";
const VALID_PASS = "admin9753";

function doLogin() {
    const user = document.getElementById("authUser").value.trim();
    const pass = document.getElementById("authPass").value.trim();
    const errorDiv = document.getElementById("authError");
    
    console.log("Попытка входа:", user, pass); // Отладка
    
    if (user === VALID_USER && pass === VALID_PASS) {
        console.log("УСПЕХ! Скрываю оверлей, показываю UI");
        document.getElementById("authOverlay").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
        document.getElementById("authUserShow").innerHTML = user.toUpperCase();
        initAllSystems();
        log("✅ Аутентификация успешна. Добро пожаловать, " + user + "!");
    } else {
        console.log("НЕВЕРНЫЙ ПАРОЛЬ");
        errorDiv.innerHTML = "❌ Неверный логин или пароль!";
        document.getElementById("authPass").value = "";
        document.getElementById("authPass").focus();
    }
}

// Обработчик Enter в полях авторизации
document.getElementById("authPass").addEventListener("keypress", function(e) {
    if (e.key === "Enter") doLogin();
});
document.getElementById("authUser").addEventListener("keypress", function(e) {
    if (e.key === "Enter") document.getElementById("authPass").focus();
});

// ========== ОСНОВНАЯ ЛОГИКА ==========
function log(msg) {
    const out = document.getElementById("cmdOutput");
    const line = document.createElement("div");
    line.innerText = msg;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
}

function executeCmd() {
    const inp = document.getElementById("cmdInput");
    if (inp.value.trim()) {
        processCommand(inp.value.trim());
        inp.value = "";
    }
}

let matrixInterval = null;

function processCommand(cmd) {
    const c = cmd.toLowerCase();
    log(`$> ${cmd}`);
    
    if (c === "help") {
        log("Доступные команды: help, clear, matrix, portscan, whois, bruteforce, keylogger, sqli, xss, ddos, wifi, bluetooth, sdr, drone, car, plc, exploit, vulnscan, trojan, botnet, rat, sms, geo, deepfake...");
    } else if (c === "clear") {
        document.getElementById("cmdOutput").innerHTML = "<div>> Консоль очищена.</div>";
    } else if (c === "matrix") {
        if (matrixInterval) {
            clearInterval(matrixInterval);
            matrixInterval = null;
            log("🌿 Матрица отключена");
        } else {
            matrixInterval = setInterval(() => {
                const span = document.createElement("span");
                span.textContent = "01アイウエオ"[Math.floor(Math.random() * 8)];
                span.style.cssText = "position:fixed; left:" + Math.random() * window.innerWidth + "px; top:0; color:rgba(100,255,100,0.6); font-size:" + (Math.random() * 20 + 10) + "px; z-index:9999; pointer-events:none;";
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 2000);
            }, 80);
            log("🌿 Матрица активирована!");
        }
    } else {
        // Пытаемся переключить вкладку
        const tabBtn = document.querySelector(`[data-tab="${c}"]`);
        if (tabBtn) {
            tabBtn.click();
            log("✅ Вкладка переключена: " + c);
        } else {
            log(`⚠️ Выполнена команда: ${c} (эмуляция)`);
        }
    }
}

// ========== СПИСОК СИСТЕМ ==========

    {id:"mobile", name:"📱 ТЕЛЕФОНЫ", html:'<div class="card"><h3>📱 USB/WIFI/ADB</h3><button onclick="log(\'Режим USB\')">USB</button><button onclick="log(\'Режим WiFi\')">WIFI</button></div>'},

    {id:"sec", name:"🦠 БЕЗОПАСНОСТЬ", html:'<div class="card"><h3>🦠 СКАНЕР</h3><input type="file" onchange="log(\'Файл: \'+this.files[0].name)"><button onclick="log(\'Сканирование...\')">СКАН</button></div>'},

    {id:"crypto", name:"🔐 КРИПТО", html:'<div class="card"><h3>🔑 ПАРОЛИ</h3><button onclick="let p=\'\';for(let i=0;i<16;i++)p+=\'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+\'[Math.floor(Math.random()*72)];log(\'Пароль: \'+p)">СГЕНЕРИРОВАТЬ</button></div>'},

    {id:"files", name:"📁 ФАЙЛЫ", html:'<div class="card"><h3>📁 FS</h3><button onclick="log(\'Файл создан: \'+Date.now())">СОЗДАТЬ</button></div>'},
    {id:"osint", name:"🕵️ OSINT", html:'<div class="card"><h3>🕵️ ДАННЫЕ</h3><button onclick="log(\'User-Agent: \'+navigator.userAgent.substring(0,50))">СОБРАТЬ</button></div>'},
    {id:"kflash", name:"💾 ОТДЕЛ K", html:'<div class="k-card"><h3>💾 RUFUS USB</h3><button class="k-btn" onclick="log(\'🔒 Переносной VPN записан на USB\')">🔒 ПЕРЕНОСНОЙ VPN</button><button class="k-btn" onclick="log(\'📶 Переносной Wi-Fi записан на USB\')">📶 ПЕРЕНОСНОЙ WI-FI</button><button class="k-btn" onclick="log(\'💿 Переносной Windows 10/11 записан на USB\')">💿 ПЕРЕНОСНОЙ WINDOWS</button></div>'},
    {id:"portscan", name:"🔍 ПОРТЫ", html:'<div class="card"><h3>🔍 СКАНЕР ПОРТОВ</h3><input placeholder="IP:Порт"><button onclick="log(\'Порт 80 открыт\')">СКАНИРОВАТЬ</button></div>'},
    {id:"whois", name:"🌍 WHOIS", html:'<div class="card"><h3>🌍 WHOIS</h3><input placeholder="example.com"><button onclick="log(\'Whois: информация о домене\')">ЗАПРОС</button></div>'},

    {id:"keylogger", name:"⌨️ KEYLOG", html:'<div class="card"><h3>⌨️ KEYLOGGER</h3><button onclick="log(\'Кейлоггер запущен\')">▶ СТАРТ</button></div>'},

    {id:"xss", name:"⚠️ XSS", html:'<div class="card"><h3>⚠️ XSS</h3><button onclick="log(\'XSS: alert(1) сработал\')">ТЕСТ</button></div>'},
    {id:"ddos", name:"☠️ DDOS", html:'<div class="card"><h3>☠️ DDOS</h3><button onclick="log(\'DDoS атака запущена!\')">ЗАПУСТИТЬ</button></div>'},
    {id:"wifi", name:"📶 WI-FI", html:'<div class="card"><h3>📶 СЕТИ</h3><button onclick="log(\'Сети: MyWiFi (WPA2), Guest\')">СКАНИРОВАТЬ</button></div>'},
    {id:"bluetooth", name:"🔵 BT", html:'<div class="card"><h3>🔵 BLUETOOTH</h3><button onclick="log(\'Устройства: наушники, телефон\')">СКАНИРОВАТЬ</button></div>'},
    {id:"sdr", name:"📻 SDR", html:'<div class="card"><h3>📻 РАДИО</h3><button onclick="log(\'Частоты: FM 101.2 МГц\')">СКАНИРОВАТЬ</button></div>'},
    {id:"drone", name:"🛸 ДРОН", html:'<div class="card"><h3>🛸 КОНТРОЛЬ</h3><button onclick="log(\'Дрон подключён!\')">ПОДКЛЮЧИТЬ</button><button onclick="log(\'Взлёт!\')">ВЗЛЁТ</button></div>'},
    {id:"car", name:"🚗 АВТО", html:'<div class="card"><h3>🚗 CAN ШИНА</h3><button onclick="log(\'CAN диагностика: OK\')">ДИАГНОСТИКА</button></div>'},

    {id:"rat", name:"🐀 RAT", html:'<div class="card"><h3>🐀 УДАЛЁННЫЙ ДОСТУП</h3><button onclick="log(\'Слушаю порт 4444...\')">СЛУШАТЬ</button></div>'},
    {id:"sms", name:"💬 SMS", html:'<div class="card"><h3>💬 SMS БОМБЕР</h3><input placeholder="+79991234567"><button onclick="log(\'100 SMS отправлено\')">ЗАПУСТИТЬ</button></div>'},
    {id:"geo", name:"📍 ГЕО", html:'<div class="card"><h3>📍 ГЕОЛОКАЦИЯ</h3><input placeholder="8.8.8.8"><button onclick="log(\'США, Калифорния\')">ОПРЕДЕЛИТЬ</button></div>'},
    {id:"deepfake", name:"🎭 DEEPFAKE", html:'<div class="card"><h3>🎭 ВИДЕО</h3><button onclick="log(\'DeepFake видео сгенерировано!\')">СОЗДАТЬ</button></div>'},
];

function initAllSystems() {
    const tabsContainer = document.getElementById("tabsContainer");
    const contentsContainer = document.getElementById("allTabContents");

    systems.forEach((sys, index) => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (index === 0 ? " active" : "");
        btn.setAttribute("data-tab", sys.id);
        btn.textContent = sys.name;
        btn.onclick = function() {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            this.classList.add("active");
            document.getElementById("tab-" + sys.id).classList.add("active");
        };
        tabsContainer.appendChild(btn);

        const div = document.createElement("div");
        div.id = "tab-" + sys.id;
        div.className = "tab-content" + (index === 0 ? " active" : "");
        div.innerHTML = '<div class="dashboard">' + sys.html + '</div>';
        contentsContainer.appendChild(div);
    });

    log("✅ Все 180+ систем активированы и готовы к работе.");
}

// Инициализация при загрузке (UI скрыт)
console.log("Система загружена. Ожидание авторизации...");
</script>
