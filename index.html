<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Haker Pro Diagnostic | Сервисный центр VR/PS/Mobile/PC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0f0a;
            background-image: linear-gradient(90deg, rgba(50,80,40,0.12) 1px, transparent 1px), linear-gradient(0deg, rgba(50,80,40,0.12) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #8bc34a;
            padding: 14px;
            min-height: 100vh;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            background: rgba(6, 14, 4, 0.94);
            border: 1px solid #5a8a3a;
            border-radius: 24px;
            padding: 16px 20px 24px;
            box-shadow: 0 0 20px rgba(70,120,40,0.15);
        }
        .glitch { font-size: 1.5rem; border-left: 4px solid #6a9a3a; padding-left: 14px; margin-bottom: 16px; color: #a8e86a; }
        .selector-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .device-type-btn {
            background: #0a1808;
            border: 1px solid #4a7a2a;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            color: #8bc34a;
        }
        .device-type-btn.active {
            background: #2a5a1a;
            color: #e0ffb0;
            box-shadow: 0 0 8px #5a9a2a;
        }
        .brand-selector {
            background: #030803;
            border-radius: 30px;
            padding: 6px 12px;
            margin: 10px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .brand-btn {
            background: #0a1808;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            border: 1px solid #3a6a2a;
            cursor: pointer;
        }
        .brand-btn.active { background: #3a7a2a; color: white; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 18px; margin-bottom: 25px; }
        .card {
            background: rgba(4, 10, 2, 0.95);
            border: 1px solid #3a6a2a;
            border-radius: 20px;
            padding: 14px;
        }
        .card h3 { font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid #3a6a2a; padding-bottom: 5px; color: #b8f080; }
        .data-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px dotted #2a4a1a; font-size: 0.72rem; flex-wrap: wrap; gap: 5px; }
        button {
            background: #0a1808;
            border: 1px solid #4a8a2a;
            color: #8bc34a;
            padding: 7px 12px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-size: 0.7rem;
            font-family: monospace;
        }
        button:hover { background: #2a5a1a; color: #e0ffb0; }
        .axis-container { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .axis-canvas-box { flex: 1; text-align: center; }
        canvas { background: #030803; border-radius: 10px; border: 1px solid #2a4a1a; width: 100%; height: 70px; }
        .antivirus-dropzone {
            border: 2px dashed #4a8a2a;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-top: 8px;
            background: #030803;
            cursor: pointer;
        }
        .scan-result {
            background: #030803;
            padding: 8px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 0.65rem;
            max-height: 120px;
            overflow-y: auto;
        }
        .threat { color: #ff8866; }
        .safe { color: #88ff88; }
        .cmd-area {
            background: #060c04;
            border: 1px solid #3a6a2a;
            border-radius: 18px;
            padding: 10px;
            margin-top: 18px;
        }
        .cmd-output {
            background: #030803;
            padding: 10px;
            font-size: 0.68rem;
            border-radius: 12px;
            max-height: 180px;
            overflow-y: auto;
        }
        .cmd-input-line { display: flex; gap: 8px; margin-top: 10px; }
        #cmdInput {
            flex: 1;
            background: #030803;
            border: 1px solid #3a6a2a;
            color: #9fdf6f;
            padding: 6px 12px;
            border-radius: 30px;
            outline: none;
            font-size: 0.7rem;
        }
        .helper-commands { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .cmd-btn { width: auto; padding: 3px 8px; font-size: 0.6rem; }
        .faq-item { border-left: 2px solid #5a9a2a; padding-left: 10px; margin-bottom: 12px; }
        .faq-item h4 { font-size: 0.8rem; color: #b8f080; }
        .faq-item p { font-size: 0.68rem; color: #aacc88; }
    </style>
</head>
<body>
<div class="container">
    <div class="glitch">🛠️ HAKER PRO SERVICE CENTER | VR | PS | MOBILE | PC 🛠️</div>

    <!-- ВЫБОР ТИПА УСТРОЙСТВА -->
    <div class="selector-bar">
        <div class="device-type-btn" data-type="vr">🥽 VR ШЛЕМ + КОНТРОЛЛЕРЫ</div>
        <div class="device-type-btn" data-type="gamepad">🎮 ДЖОЙСТИКИ PS/ПРИСТАВКИ</div>
        <div class="device-type-btn" data-type="mobile">📱 ТЕЛЕФОНЫ / ПЛАНШЕТЫ</div>
        <div class="device-type-btn" data-type="pc">🖥️ ПК / НОУТБУК</div>
        <div class="device-type-btn" data-type="antivirus">🦠 АНТИВИРУС + БЕЗОПАСНОСТЬ</div>
    </div>

    <!-- ДИНАМИЧЕСКИЙ КОНТЕНТ -->
    <div id="dynamicContent"></div>

    <!-- CMD КОНСОЛЬ -->
    <div class="cmd-area">
        <div class="cmd-output" id="cmdOutput">> Сервисный центр готов. Выберите тип устройства для диагностики.<br>> Команды: help, vrinfo, test-network, virus-scan, clear</div>
        <div class="cmd-input-line"><span>$&gt;</span><input type="text" id="cmdInput"><button id="execCmdBtn">ВЫПОЛНИТЬ</button></div>
        <div class="helper-commands">
            <button class="cmd-btn" data-cmd="help">help</button>
            <button class="cmd-btn" data-cmd="test-network">ping</button>
            <button class="cmd-btn" data-cmd="virus-scan">scan</button>
            <button class="cmd-btn" data-cmd="clear">clear</button>
        </div>
    </div>
</div>

<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentType = "vr";
    let selectedBrand = "teсno"; // для мобильных
    let gamepads = [];
    let threatLog = JSON.parse(localStorage.getItem("threatLog") || "[]");
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function addCmdMsg(msg) { const out=document.getElementById("cmdOutput"); const line=document.createElement("div"); line.innerText=msg; out.appendChild(line); out.scrollTop=out.scrollHeight; }
    function clearCmd() { document.getElementById("cmdOutput").innerHTML="<div>> Консоль очищена.</div>"; }
    
    function addToThreatLog(threat) { threatLog.unshift({time:new Date().toLocaleTimeString(), threat}); if(threatLog.length>15) threatLog.pop(); localStorage.setItem("threatLog",JSON.stringify(threatLog)); addCmdMsg(`⚠️ ${threat}`); }
    
    // ========== ВЫБОР ТИПА ==========
    function renderContent() {
        const container = document.getElementById("dynamicContent");
        if(currentType === "vr") container.innerHTML = renderVR();
        else if(currentType === "gamepad") container.innerHTML = renderGamepad();
        else if(currentType === "mobile") container.innerHTML = renderMobile();
        else if(currentType === "pc") container.innerHTML = renderPC();
        else if(currentType === "antivirus") container.innerHTML = renderAntivirus();
        attachTypeEvents();
    }
    
    // ========== VR ШЛЕМ + КОНТРОЛЛЕРЫ ==========
    function renderVR() {
        return `
            <div class="dashboard">
                <div class="card"><h3>🥽 VR ШЛЕМ</h3>
                    <div class="data-row">WebXR: <span id="vrStatus">—</span></div>
                    <div class="data-row">OpenXR: <span id="openxrStatus">—</span></div>
                    <div class="data-row">Частота (симул.): <span id="vrHertz">—</span></div>
                    <button id="vrTestBtn">📊 ТЕСТ VR ШЛЕМА</button>
                    <button id="vrStressBtn">🔥 СТРЕСС VR</button>
                </div>
                <div class="card"><h3>🕹️ VR КОНТРОЛЛЕРЫ</h3>
                    <div id="vrControllerStatus">🔍 Поиск контроллеров...</div>
                    <div id="vrControllerDetail" style="font-size:0.65rem;"></div>
                    <button id="pairVrBtn">🔗 ПОДКЛЮЧИТЬ VR КОНТРОЛЛЕРЫ</button>
                    <button id="vibrateVrBtn">📳 ТЕСТ ВИБРАЦИИ</button>
                </div>
                <div class="card"><h3>📊 ТРЕКИНГ / POSITION</h3>
                    <div class="data-row">Позиция X: <span id="posX">0.00</span></div>
                    <div class="data-row">Позиция Y: <span id="posY">0.00</span></div>
                    <div class="data-row">Позиция Z: <span id="posZ">0.00</span></div>
                    <button id="resetTrackingBtn">⟳ СБРОС ТРЕКИНГА</button>
                </div>
            </div>
        `;
    }
    
    // ========== ДЖОЙСТИКИ PS/ПРИСТАВКИ ==========
    function renderGamepad() {
        return `
            <div class="brand-selector">
                <span>🎮 Выберите тип:</span>
                <div class="brand-btn gamepad-type" data-gpad="ps">PLAYSTATION (PS4/PS5)</div>
                <div class="brand-btn gamepad-type" data-gpad="xbox">XBOX / ПРИСТАВКА</div>
                <div class="brand-btn gamepad-type" data-gpad="switch">NINTENDO SWITCH</div>
                <div class="brand-btn gamepad-type" data-gpad="pc">PC / УНИВЕРСАЛЬНЫЙ</div>
            </div>
            <div class="dashboard">
                <div class="card"><h3>🎮 ТЕСТ ДЖОЙСТИКА</h3>
                    <div id="gamepadStatus">🔍 Поиск...</div>
                    <div id="gpDetails" style="font-size:0.65rem;"></div>
                    <div class="axis-container">
                        <div class="axis-canvas-box"><span>ЛЕВЫЙ СТИК</span><canvas id="leftStickCanvas"></canvas></div>
                        <div class="axis-canvas-box"><span>ПРАВЫЙ СТИК</span><canvas id="rightStickCanvas"></canvas></div>
                    </div>
                    <button id="driftTestBtn">🔄 ТЕСТ ДРИФТА</button>
                    <button id="stressBtn">⚡ СТРЕСС-ТЕСТ КНОПОК</button>
                    <button id="vibrateGamepadBtn">📳 ТЕСТ ВИБРАЦИИ</button>
                </div>
                <div class="card"><h3>📊 ДАННЫЕ СТИКОВ</h3>
                    <div class="data-row">Левый X: <span id="leftX">0.00</span></div>
                    <div class="data-row">Левый Y: <span id="leftY">0.00</span></div>
                    <div class="data-row">Правый X: <span id="rightX">0.00</span></div>
                    <div class="data-row">Правый Y: <span id="rightY">0.00</span></div>
                    <div class="data-row">Нажатые кнопки: <span id="pressedBtns">—</span></div>
                </div>
            </div>
        `;
    }
    
    // ========== ТЕЛЕФОНЫ С ВЫБОРОМ МАРКИ ==========
    function renderMobile() {
        const brands = ["tecno", "infinix", "itel", "xiaomi", "samsung", "huawei", "iphone", "oppo", "vivo", "realme", "oneplus", "pixel", "nokia", "sony", "motorola", "lg", "htc", "other"];
        const brandButtons = brands.map(b => `<div class="brand-btn mobile-brand" data-brand="${b}">${b.toUpperCase()}</div>`).join("");
        return `
            <div class="brand-selector">
                <span>📱 Выберите марку телефона:</span>
                ${brandButtons}
            </div>
            <div class="dashboard">
                <div class="card"><h3>📱 ДАТЧИКИ ТЕЛЕФОНА</h3>
                    <div class="data-row">Гироскоп: <span id="gyroData">—</span></div>
                    <div class="data-row">Акселерометр: <span id="accelData">—</span></div>
                    <div class="data-row">Магнитометр: <span id="magnData">—</span></div>
                    <div class="data-row">Мультитач: <span id="touchData">0</span></div>
                    <button id="testHapticBtn">📳 ТЕСТ ВИБРАЦИИ</button>
                    <button id="testBiometryBtn">👤 ТЕСТ БИОМЕТРИИ</button>
                    <button id="testCameraBtn">📸 ТЕСТ КАМЕРЫ</button>
                    <button id="gpuStressMobile">🎮 GPU СТРЕСС</button>
                </div>
                <div class="card"><h3>🔋 БАТАРЕЯ / ЭКРАН</h3>
                    <div class="data-row">Уровень заряда: <span id="batteryLevel">—</span></div>
                    <div class="data-row">Частота экрана: <span id="screenHz">—</span></div>
                    <div class="data-row">Производитель: <span id="brandDetected">—</span></div>
                    <button id="pixelTestBtn">🖥️ ТЕСТ ПИКСЕЛЕЙ</button>
                    <button id="brightnessTestBtn">🔆 ТЕСТ ЯРКОСТИ</button>
                </div>
            </div>
        `;
    }
    
    // ========== ПК / НОУТБУК ==========
    function renderPC() {
        return `
            <div class="dashboard">
                <div class="card"><h3>🖥️ ХАРАКТЕРИСТИКИ ПК</h3>
                    <div class="data-row">Процессор: <span id="cpuInfo">—</span></div>
                    <div class="data-row">ОЗУ: <span id="ramInfo">—</span></div>
                    <div class="data-row">Видеокарта: <span id="gpuInfo">—</span></div>
                    <div class="data-row">ОС: <span id="osInfo">—</span></div>
                    <button id="cpuStressBtn">🔥 СТРЕСС-ТЕСТ CPU</button>
                    <button id="gpuPcStressBtn">🎮 СТРЕСС GPU (WebGL)</button>
                </div>
                <div class="card"><h3>🌡️ ТЕМПЕРАТУРА (СИМУЛ.)</h3>
                    <div class="data-row">CPU: <span id="tempCpu">—</span></div>
                    <div class="data-row">GPU: <span id="tempGpu">—</span></div>
                    <button id="batteryPcBtn">🔋 ДИАГНОСТИКА БАТАРЕИ</button>
                    <button id="diskTestBtn">💾 ТЕСТ ДИСКА (WRITE)</button>
                </div>
            </div>
        `;
    }
    
    // ========== АНТИВИРУС ==========
    function renderAntivirus() {
        return `
            <div class="dashboard">
                <div class="card"><h3>🦠 ПРОВЕРКА ФАЙЛОВ</h3>
                    <div id="dropZone" class="antivirus-dropzone">📂 Перетащите файл или нажмите для выбора<input type="file" id="fileInput" style="display:none;"></div>
                    <div id="fileScanResult" class="scan-result">Ожидание файла...</div>
                </div>
                <div class="card"><h3>🔗 ПРОВЕРКА ССЫЛОК</h3>
                    <input type="text" id="urlInput" placeholder="Вставьте ссылку..." style="width:100%; background:#030803; border:1px solid #3a6a2a; color:#8bc34a; padding:6px; border-radius:12px;">
                    <button id="checkUrlBtn">🔍 ПРОВЕРИТЬ</button>
                    <div id="urlScanResult" class="scan-result">Ожидание ссылки...</div>
                </div>
                <div class="card"><h3>💻 СКАНИРОВАНИЕ СИСТЕМЫ</h3>
                    <button id="scanSystemBtn">🖥️ СКАНИРОВАТЬ</button>
                    <button id="fullScanBtn">🔍 ПОЛНОЕ СКАНИРОВАНИЕ</button>
                    <div id="sysScanResult" class="scan-result">Не запущено</div>
                </div>
            </div>
            <div class="card"><h3>📜 ЛОГ УГРОЗ</h3><div id="threatLogDiv" class="scan-result">Нет угроз</div><button id="clearThreatLogBtn">🗑️ ОЧИСТИТЬ</button></div>
        `;
    }
    
    // ========== ПРИВЯЗКА СОБЫТИЙ ==========
    function attachTypeEvents() {
        if(currentType === "vr") {
            document.getElementById("vrTestBtn")?.addEventListener("click",()=>{ addCmdMsg("✅ VR шлем: тест WebXR"); document.getElementById("vrStatus").innerHTML="✅ Доступен"; });
            document.getElementById("vrStressBtn")?.addEventListener("click",()=>{ addCmdMsg("🔥 VR стресс"); for(let i=0;i<100;i++) requestAnimationFrame(()=>{}); });
            document.getElementById("pairVrBtn")?.addEventListener("click",()=>{ addCmdMsg("🕹️ Подключите VR контроллеры через Bluetooth"); document.getElementById("vrControllerStatus").innerHTML="🔄 В режиме паринга..."; });
            document.getElementById("vibrateVrBtn")?.addEventListener("click",()=>{ if(navigator.vibrate) navigator.vibrate([200,100,200]); addCmdMsg("📳 Вибрация отправлена"); });
            document.getElementById("resetTrackingBtn")?.addEventListener("click",()=>{ addCmdMsg("⟳ Трекинг сброшен"); });
        }
        if(currentType === "gamepad") {
            document.querySelectorAll(".gamepad-type").forEach(btn=>{
                btn.onclick=()=>{ addCmdMsg(`🎮 Выбран тип: ${btn.innerText}`); };
            });
            document.getElementById("driftTestBtn")?.addEventListener("click",()=>{ if(gamepads.length) addCmdMsg(`Дрифт: L(${gamepads[0].axes[0]?.toFixed(2)},${gamepads[0].axes[1]?.toFixed(2)}) R(${gamepads[0].axes[2]?.toFixed(2)},${gamepads[0].axes[3]?.toFixed(2)})`); else addCmdMsg("Нет джойстика"); });
            document.getElementById("stressBtn")?.addEventListener("click",()=>{ addCmdMsg("⚡ Стресс-тест: кнопки опрошены"); });
            document.getElementById("vibrateGamepadBtn")?.addEventListener("click",()=>{ if(gamepads[0]?.vibrationActuator) gamepads[0].vibrationActuator.playEffect("dual-rumble",{duration:300}); addCmdMsg("📳 Вибрация запущена"); });
        }
        if(currentType === "mobile") {
            document.querySelectorAll(".mobile-brand").forEach(btn=>{
                btn.onclick=()=>{ selectedBrand=btn.getAttribute("data-brand"); addCmdMsg(`📱 Выбрана марка: ${selectedBrand.toUpperCase()}`); document.getElementById("brandDetected").innerHTML=selectedBrand.toUpperCase(); if(selectedBrand==="iphone") addCmdMsg("🍎 iOS: доступны ограниченные тесты датчиков"); else if(selectedBrand==="tecno"||selectedBrand==="infinix"||selectedBrand==="itel") addCmdMsg(`🎉 ${selectedBrand.toUpperCase()} — полная поддержка датчиков и вибрации`); };
            });
            document.getElementById("testHapticBtn")?.addEventListener("click",()=>{ if(navigator.vibrate) navigator.vibrate(200); addCmdMsg("📳 Вибрация"); });
            document.getElementById("testBiometryBtn")?.addEventListener("click",()=>{ addCmdMsg("👤 Биометрия: на реальном устройстве запросило бы Face ID/Touch ID"); });
            document.getElementById("testCameraBtn")?.addEventListener("click",async()=>{ try{await navigator.mediaDevices.getUserMedia({video:true}); addCmdMsg("✅ Камера доступна");}catch(e){addCmdMsg("❌ Нет доступа");} });
            document.getElementById("gpuStressMobile")?.addEventListener("click",()=>{ let frames=0; const s=performance.now(); function r(){frames++;if(performance.now()-s<2000)requestAnimationFrame(r);else addCmdMsg(`GPU тест: ${Math.round(frames/2)} FPS`);} r(); });
            document.getElementById("pixelTestBtn")?.addEventListener("click",()=>{ document.body.style.background="#ff0000"; setTimeout(()=>document.body.style.background="#00ff00",500); setTimeout(()=>document.body.style.background="#0000ff",1000); setTimeout(()=>document.body.style.background="",1500); });
            document.getElementById("brightnessTestBtn")?.addEventListener("click",()=>{ addCmdMsg("🔆 Яркость: проверьте визуально"); });
        }
        if(currentType === "pc") {
            document.getElementById("cpuStressBtn")?.addEventListener("click",()=>{ let i=0; const start=Date.now(); while(Date.now()-start<2000){Math.sqrt(i++);} addCmdMsg("🔥 CPU стресс-тест завершён"); });
            document.getElementById("gpuPcStressBtn")?.addEventListener("click",()=>{ const canvas=document.createElement("canvas"); const gl=canvas.getContext("webgl"); if(gl){addCmdMsg("🎮 GPU стресс запущен"); let frames=0; const s=performance.now(); function r(){gl.clearColor(Math.random(),Math.random(),Math.random(),1);gl.clear(gl.COLOR_BUFFER_BIT);frames++;if(performance.now()-s<2000)requestAnimationFrame(r);else addCmdMsg(`FPS: ${Math.round(frames/2)}`);} r();}else addCmdMsg("WebGL не поддерживается"); });
            document.getElementById("batteryPcBtn")?.addEventListener("click",()=>{ if(navigator.getBattery) navigator.getBattery().then(b=>addCmdMsg(`Батарея: ${Math.round(b.level*100)}%`)); else addCmdMsg("N/A"); });
            document.getElementById("diskTestBtn")?.addEventListener("click",()=>{ const blob=new Blob(["test"]); const url=URL.createObjectURL(blob); addCmdMsg("💾 Диск: запись успешна"); URL.revokeObjectURL(url); });
        }
        if(currentType === "antivirus") {
            const dropZone=document.getElementById("dropZone"); const fileInput=document.getElementById("fileInput");
            dropZone.onclick=()=>fileInput.click(); fileInput.onchange=(e)=>scanFile(e.target.files[0]);
            dropZone.ondragover=(e)=>e.preventDefault(); dropZone.ondrop=(e)=>{e.preventDefault(); scanFile(e.dataTransfer.files[0]);};
            document.getElementById("checkUrlBtn").onclick=()=>{ const url=document.getElementById("urlInput").value; if(url) checkUrl(url); else addCmdMsg("Введите ссылку"); };
            document.getElementById("scanSystemBtn").onclick=scanSystem; document.getElementById("fullScanBtn").onclick=fullSystemScan;
            document.getElementById("clearThreatLogBtn").onclick=()=>{ threatLog=[]; localStorage.setItem("threatLog","[]"); updateThreatLogUI(); addCmdMsg("Лог очищен"); };
            updateThreatLogUI();
        }
    }
    
    // ========== АНТИВИРУСНЫЕ ФУНКЦИИ ==========
    function scanFile(file){ if(!file)return; const reader=new FileReader(); reader.onload=(e)=>{ const content=e.target.result; let threats=[]; if(/eval|exec|shell_exec/i.test(content)) threats.push("Опасный код"); if(/MZ/.test(content)) threats.push("EXE файл"); if(threats.length){ document.getElementById("fileScanResult").innerHTML=`<span class="threat">⚠️ ${threats.join(", ")}</span>`; threats.forEach(t=>addToThreatLog(`${file.name}: ${t}`));}else document.getElementById("fileScanResult").innerHTML=`<span class="safe">✅ Безопасно (${(file.size/1024).toFixed(1)}KB)</span>`;}; reader.readAsText(file);}
    function checkUrl(url){ let threats=[]; if(/bit\.ly|tinyurl|rb\.gy|cutt\.ly/.test(url)) threats.push("Сокращатель ссылок"); if(/\.exe|\.scr/.test(url)) threats.push("Прямая ссылка на EXE"); if(threats.length){ document.getElementById("urlScanResult").innerHTML=`<span class="threat">⚠️ ${threats.join(", ")}</span>`; threats.forEach(t=>addToThreatLog(`URL: ${t} | ${url.substring(0,50)}`));}else document.getElementById("urlScanResult").innerHTML=`<span class="safe">✅ Ссылка безопасна</span>`;}
    function scanSystem(){ let threats=[]; for(let i=0;i<localStorage.length;i++) if(localStorage.key(i).includes("script")) threats.push("Подозрительный localStorage"); document.getElementById("sysScanResult").innerHTML=threats.length?`<span class="threat">⚠️ ${threats.length} угроз</span>`:`<span class="safe">✅ Система чиста</span>`; threats.forEach(t=>addToThreatLog(t));}
    function fullSystemScan(){ scanSystem(); addToThreatLog("Полное сканирование завершено"); addCmdMsg("🔍 Полное сканирование выполнено");}
    function updateThreatLogUI(){ const logDiv=document.getElementById("threatLogDiv"); if(logDiv) logDiv.innerHTML=threatLog.length?threatLog.map(t=>`🕒 ${t.time} | ${t.threat}`).join("<br>"):"Нет угроз";}
    
    // ========== ОБНОВЛЕНИЕ ГЕЙМПАДОВ ==========
    function updateGamepadsLoop(){
        const gps=navigator.getGamepads?navigator.getGamepads():[];
        gamepads=gps.filter(gp=>gp&&gp.connected);
        if(currentType==="gamepad"){
            document.getElementById("gamepadStatus").innerHTML=gamepads.length?`✅ АКТИВНО: ${gamepads.length}`:"❌ НЕТ КОНТРОЛЛЕРА";
            if(gamepads.length){
                const gp=gamepads[0];
                const left=[gp.axes[0]||0,gp.axes[1]||0]; const right=[gp.axes[2]||0,gp.axes[3]||0];
                drawStick("leftStickCanvas",left[0],left[1]); drawStick("rightStickCanvas",right[0],right[1]);
                document.getElementById("leftX").innerHTML=left[0].toFixed(3); document.getElementById("leftY").innerHTML=left[1].toFixed(3);
                document.getElementById("rightX").innerHTML=right[0].toFixed(3); document.getElementById("rightY").innerHTML=right[1].toFixed(3);
                const pressed=gp.buttons.map((b,i)=>b.pressed?i:null).filter(v=>v!==null);
                document.getElementById("pressedBtns").innerHTML=pressed.length?pressed.join(","):"нет";
                document.getElementById("gpDetails").innerHTML=`${gp.id.substring(0,30)} | бренд: ${gp.id.includes("Sony")?"PS":gp.id.includes("Xbox")?"XBOX":"Стандарт"}`;
            }
        }
        requestAnimationFrame(updateGamepadsLoop);
    }
    function drawStick(id,x,y){const c=document.getElementById(id);if(!c)return;const ctx=c.getContext("2d"),w=c.clientWidth,h=c.clientHeight;c.width=w;c.height=h;ctx.fillStyle="#030803";ctx.fillRect(0,0,w,h);ctx.strokeStyle="#4a8a2a";ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();const px=(x+1)/2*w,py=(y+1)/2*h;ctx.fillStyle="#8bc34a";ctx.beginPath();ctx.arc(px,py,5,0,2*Math.PI);ctx.fill();}
    
    // СИСТЕМНАЯ ИНФОРМАЦИЯ ДЛЯ ПК
    function fillPCInfo(){
        if(currentType!=="pc") return;
        document.getElementById("cpuInfo").innerHTML = navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} ядер` : "Unknown";
        document.getElementById("ramInfo").innerHTML = performance.memory ? `${(performance.memory.jsHeapSizeLimit/1073741824).toFixed(1)} GB` : "Unknown";
        document.getElementById("gpuInfo").innerHTML = "WebGL рендер";
        document.getElementById("osInfo").innerHTML = navigator.platform;
    }
    
    // ДАТЧИКИ ДЛЯ ТЕЛЕФОНОВ
    function initMobileSensors(){
        if(window.DeviceOrientationEvent) window.addEventListener('deviceorientation',(e)=>{ if(currentType==="mobile") document.getElementById("gyroData").innerHTML=`β:${e.beta?.toFixed(0)}° γ:${e.gamma?.toFixed(0)}°`; });
        if(window.DeviceMotionEvent) window.addEventListener('devicemotion',(e)=>{ if(currentType==="mobile"&&e.acceleration) document.getElementById("accelData").innerHTML=`x:${e.acceleration.x?.toFixed(1)}`; });
        let tc=0; window.addEventListener('touchstart',(e)=>{ tc=e.touches.length; if(currentType==="mobile") document.getElementById("touchData").innerHTML=tc; });
        if(navigator.getBattery) navigator.getBattery().then(b=>{ if(currentType==="mobile") document.getElementById("batteryLevel").innerHTML=`${Math.round(b.level*100)}%`; });
        setInterval(()=>{ if(currentType==="mobile"){ const hz=screen.refreshRate||60; document.getElementById("screenHz").innerHTML=hz+" Hz"; } },1000);
    }
    
    // ========== CMD ==========
    function processCommand(cmd){
        const c=cmd.trim().toLowerCase();
        addCmdMsg(`$> ${cmd}`);
        if(c==="help") addCmdMsg("vrinfo, test-network, virus-scan, clear");
        else if(c==="vrinfo") addCmdMsg(`VR статус: ${currentType==="vr"?"активен":"не выбран"}`);
        else if(c==="test-network") { const s=Date.now(); fetch("https://www.google.com/favicon.ico",{mode:'no-cors'}).catch(()=>{}); addCmdMsg(`Пинг: ${Date.now()-s} мс`); }
        else if(c==="virus-scan") addCmdMsg("🦠 Перетащите файл в антивирус");
        else if(c==="clear") clearCmd();
        else addCmdMsg(`Неизвестно: ${c}`);
    }
    
    // ========== ЗАПУСК ==========
    document.querySelectorAll(".device-type-btn").forEach(btn=>{
        btn.onclick=()=>{
            currentType=btn.getAttribute("data-type");
            document.querySelectorAll(".device-type-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            renderContent();
            if(currentType==="pc") fillPCInfo();
            if(currentType==="mobile") initMobileSensors();
        };
    });
    renderContent();
    updateGamepadsLoop();
    initMobileSensors();
    document.getElementById("execCmdBtn").onclick=()=>{ const inp=document.getElementById("cmdInput"); if(inp.value) processCommand(inp.value); inp.value=""; };
    document.getElementById("cmdInput").addEventListener("keypress",(e)=>{ if(e.key==="Enter"){ const inp=document.getElementById("cmdInput"); if(inp.value) processCommand(inp.value); inp.value=""; } });
    document.querySelectorAll(".cmd-btn").forEach(btn=>btn.onclick=()=>processCommand(btn.getAttribute("data-cmd")));
</script>
</body>
</html>
